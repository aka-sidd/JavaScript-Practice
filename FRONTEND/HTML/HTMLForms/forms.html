<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-Forms</title>
</head>
<body>
    
    <form>
        <label for="name">Name:</label>
          <input type="text" pattern="[A-Za-z ]+" name = "username" id="name">
        <br> <br>
        <label for="fname">Father's Name:</label>
        <input type="text" pattern="[A-Za-z ]+" name = "userfname" id="fname">
        <br><br>
        <label for="age">Age:</label>
        <input type="number" name = "userage" id="age">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" name = "userpassword" id="password">
        <br><br>
        <label for="male">Male</label>
        <input type="radio" name = "gender" value="male" id="male">
        <label for="female">Female</label>
        <input type="radio" name = "gender" value="female" id="female">
        <label for="other">Other</label>
        <input type="radio" name = "gender" value="other" id="other">    
        <br><br>

        <label for="c++">C++</label>
        <input type="checkbox" name = "subject" id = "c++" value = "c++">
         <label for="java">Java</label>
        <input type="checkbox" name = "subject" id = "java" value = "java">
         <label for="python">Python</label>
        <input type="checkbox" name = "subject" id = "python" value = "python">
        <input type="submit">
    </form>

</body>
</html>
